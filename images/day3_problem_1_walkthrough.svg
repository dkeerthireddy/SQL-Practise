  <text x="340" y="433" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#2C2C2A">After reversal loop: prev=node(4) [new head] · curr=node(5) [continuation] · prev_before.next=node(2) [new tail — use before overwriting]</text>
