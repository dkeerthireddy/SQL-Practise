<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="680" height="460" fill="#FFFFFF"/>
  <defs>
    <marker id="a3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2C2C2A"/>
    </marker>
    <marker id="a3r" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E24B4A"/>
    </marker>
    <marker id="a3g" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3B6D11"/>
    </marker>
  </defs>
  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Problem 3: Sort List (#148) — Merge Sort Walkthrough</text>
  <text x="340" y="38" text-anchor="middle" font-size="12" fill="#888780">Input: 4→2→1→3   Expected: 1→2→3→4</text>

  <text x="20" y="62" font-size="13" font-weight="500" fill="#E24B4A">↓ Split Phase (find midpoint, sever)</text>

  <text x="20" y="85" font-size="11" fill="#888780">sortList(4→2→1→3):</text>
  <text x="160" y="85" font-size="11" fill="#2C2C2A">slow=4, fast=2</text>
  <text x="310" y="85" font-size="11" fill="#2C2C2A">→ iter: slow=2, fast stops → sever at slow</text>
  <rect x="20" y="90" width="30" height="24" rx="5" fill="#888780" stroke="#2C2C2A" stroke-width="0.5"/><text x="35" y="107" text-anchor="middle" font-size="12" fill="#FFF">4</text>
  <line x1="50" y1="102" x2="58" y2="102" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="58" y="90" width="30" height="24" rx="5" fill="#3B8BD4" stroke="#2C2C2A" stroke-width="0.5"/><text x="73" y="107" text-anchor="middle" font-size="12" fill="#FFF">2</text>
  <text x="73" y="87" text-anchor="middle" font-size="9" fill="#3B8BD4">slow</text>
  <line x1="88" y1="102" x2="96" y2="102" stroke="#E24B4A" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a3r)"/>
  <text x="92" y="94" font-size="9" fill="#E24B4A">SEVER</text>
  <rect x="96" y="90" width="30" height="24" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/><text x="111" y="107" text-anchor="middle" font-size="12" fill="#FFF">1</text>
  <line x1="126" y1="102" x2="134" y2="102" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="134" y="90" width="30" height="24" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/><text x="149" y="107" text-anchor="middle" font-size="12" fill="#FFF">3</text>
  <text x="73" y="122" font-size="11" fill="#3B8BD4">left: 4→2</text>
  <text x="125" y="122" font-size="11" fill="#EF9F27">right: 1→3</text>

  <text x="20" y="147" font-size="11" fill="#888780">sortList(4→2):</text>
  <text x="130" y="147" font-size="11" fill="#2C2C2A">slow=4, fast=2 (fast.next=null) → stop; mid=2; sever</text>
  <rect x="20" y="152" width="30" height="24" rx="5" fill="#3B8BD4" stroke="#2C2C2A" stroke-width="0.5"/><text x="35" y="169" text-anchor="middle" font-size="12" fill="#FFF">4</text>
  <line x1="50" y1="164" x2="58" y2="164" stroke="#E24B4A" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a3r)"/>
  <rect x="58" y="152" width="30" height="24" rx="5" fill="#3B8BD4" stroke="#2C2C2A" stroke-width="0.5"/><text x="73" y="169" text-anchor="middle" font-size="12" fill="#FFF">2</text>
  <text x="35" y="185" font-size="11" fill="#3B8BD4">[4]</text>
  <text x="73" y="185" font-size="11" fill="#3B8BD4">[2]</text>
  <text x="100" y="185" font-size="11" fill="#2C2C2A">→ base cases (single nodes)</text>

  <text x="300" y="147" font-size="11" fill="#888780">sortList(1→3):</text>
  <text x="410" y="147" font-size="11" fill="#2C2C2A">slow=1, fast=3 → stop; sever</text>
  <rect x="300" y="152" width="30" height="24" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/><text x="315" y="169" text-anchor="middle" font-size="12" fill="#FFF">1</text>
  <line x1="330" y1="164" x2="338" y2="164" stroke="#E24B4A" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#a3r)"/>
  <rect x="338" y="152" width="30" height="24" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/><text x="353" y="169" text-anchor="middle" font-size="12" fill="#FFF">3</text>
  <text x="315" y="185" font-size="11" fill="#EF9F27">[1]</text>
  <text x="353" y="185" font-size="11" fill="#EF9F27">[3]</text>

  <text x="20" y="214" font-size="13" font-weight="500" fill="#3B6D11">↑ Merge Phase (merge sorted halves back up)</text>

  <text x="20" y="240" font-size="11" fill="#888780">merge([4],[2]):</text>
  <text x="120" y="240" font-size="11" fill="#2C2C2A">4>2 → take 2; then take 4 (l2 empty)</text>
  <rect x="200" y="228" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="215" y="245" text-anchor="middle" font-size="12" fill="#FFF">2</text>
  <line x1="230" y1="240" x2="238" y2="240" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="238" y="228" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="253" y="245" text-anchor="middle" font-size="12" fill="#FFF">4</text>
  <text x="272" y="240" font-size="11" fill="#3B6D11">→ sorted: 2→4</text>

  <text x="20" y="277" font-size="11" fill="#888780">merge([1],[3]):</text>
  <text x="120" y="277" font-size="11" fill="#2C2C2A">1≤3 → take 1; attach tail 3</text>
  <rect x="200" y="265" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="215" y="282" text-anchor="middle" font-size="12" fill="#FFF">1</text>
  <line x1="230" y1="277" x2="238" y2="277" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="238" y="265" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="253" y="282" text-anchor="middle" font-size="12" fill="#FFF">3</text>
  <text x="272" y="277" font-size="11" fill="#3B6D11">→ sorted: 1→3</text>

  <text x="20" y="318" font-size="11" font-weight="500" fill="#888780">merge(2→4, 1→3):</text>
  <text x="160" y="304" font-size="11" fill="#2C2C2A">Step 1: 2>1 → take 1;  right=3</text>
  <text x="160" y="318" font-size="11" fill="#2C2C2A">Step 2: 2≤3 → take 2;  left=4</text>
  <text x="160" y="332" font-size="11" fill="#2C2C2A">Step 3: 4>3 → take 3;  right=∅</text>
  <text x="160" y="346" font-size="11" fill="#2C2C2A">Tail attach: curr.next = node(4)  [O(1)]</text>

  <rect x="20" y="374" width="640" height="72" rx="6" fill="#F4FFF4" stroke="#3B6D11" stroke-width="1"/>
  <text x="36" y="394" font-size="12" font-weight="500" fill="#3B6D11">Final result: 1→2→3→4 ✓</text>
  <rect x="36" y="400" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="51" y="417" text-anchor="middle" font-size="13" fill="#FFF">1</text>
  <line x1="66" y1="412" x2="74" y2="412" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="74" y="400" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="89" y="417" text-anchor="middle" font-size="13" fill="#FFF">2</text>
  <line x1="104" y1="412" x2="112" y2="412" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="112" y="400" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="127" y="417" text-anchor="middle" font-size="13" fill="#FFF">3</text>
  <line x1="142" y1="412" x2="150" y2="412" stroke="#2C2C2A" stroke-width="1.2" marker-end="url(#a3)"/>
  <rect x="150" y="400" width="30" height="24" rx="5" fill="#3B6D11" stroke="#2C2C2A" stroke-width="0.5"/><text x="165" y="417" text-anchor="middle" font-size="13" fill="#FFF">4</text>
  <text x="200" y="417" font-size="11" fill="#888780">Critical: slow.next=None before recursing — without this, left half still links right → infinite recursion</text>
</svg>
