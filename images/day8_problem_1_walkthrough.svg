<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500" font-family="Menlo, 'Courier New', monospace" font-size="12">
  <!-- Background -->
  <rect width="860" height="500" fill="#0f172a" rx="14"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="bold">Daily Temperatures #739 — Stack Walkthrough</text>
  <text x="430" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">temperatures = [73, 74, 75, 71, 69, 72, 76, 73]   answer = [1, 1, 4, 2, 1, 1, 0, 0]</text>

  <!-- Temperature array header -->
  <text x="30" y="82" fill="#64748b" font-size="11">index:  </text>
  <text x="82" y="82" fill="#64748b" font-size="11">0    1    2    3    4    5    6    7</text>
  <text x="30" y="98" fill="#94a3b8" font-size="11">temp: </text>
  <text x="82" y="98" fill="#e2e8f0" font-size="11">73   74   75   71   69   72   76   73</text>

  <!-- Column headers -->
  <text x="30"  y="130" fill="#64748b" font-size="11">step</text>
  <text x="80"  y="130" fill="#64748b" font-size="11">i</text>
  <text x="105" y="130" fill="#64748b" font-size="11">T[i]</text>
  <text x="155" y="130" fill="#64748b" font-size="11">action</text>
  <text x="390" y="130" fill="#64748b" font-size="11">stack (indices)</text>
  <text x="590" y="130" fill="#64748b" font-size="11">answer so far</text>
  <line x1="20" y1="135" x2="840" y2="135" stroke="#334155" stroke-width="1"/>

  <!-- Row data -->
  <!-- Row 1: i=0 -->
  <rect x="20" y="138" width="820" height="24" fill="#1e293b" rx="3"/>
  <text x="30"  y="155" fill="#94a3b8" font-size="11">1</text>
  <text x="80"  y="155" fill="#38bdf8" font-size="11">0</text>
  <text x="105" y="155" fill="#fbbf24" font-size="11">73</text>
  <text x="155" y="155" fill="#4ade80" font-size="11">stack empty → push 0</text>
  <text x="390" y="155" fill="#93c5fd" font-size="11">[0]</text>
  <text x="590" y="155" fill="#94a3b8" font-size="11">[0,0,0,0,0,0,0,0]</text>

  <!-- Row 2: i=1 -->
  <text x="30"  y="179" fill="#94a3b8" font-size="11">2</text>
  <text x="80"  y="179" fill="#38bdf8" font-size="11">1</text>
  <text x="105" y="179" fill="#fbbf24" font-size="11">74</text>
  <text x="155" y="179" fill="#f87171" font-size="11">74&gt;T[0]=73 → pop 0, ans[0]=1-0=1</text>
  <text x="390" y="179" fill="#93c5fd" font-size="11">[] → push 1 → [1]</text>
  <text x="590" y="179" fill="#4ade80" font-size="11">[1,0,0,0,0,0,0,0]</text>

  <!-- Row 3: i=2 -->
  <rect x="20" y="186" width="820" height="24" fill="#1e293b" rx="3"/>
  <text x="30"  y="203" fill="#94a3b8" font-size="11">3</text>
  <text x="80"  y="203" fill="#38bdf8" font-size="11">2</text>
  <text x="105" y="203" fill="#fbbf24" font-size="11">75</text>
  <text x="155" y="203" fill="#f87171" font-size="11">75&gt;T[1]=74 → pop 1, ans[1]=2-1=1</text>
  <text x="390" y="203" fill="#93c5fd" font-size="11">[] → push 2 → [2]</text>
  <text x="590" y="203" fill="#4ade80" font-size="11">[1,1,0,0,0,0,0,0]</text>

  <!-- Row 4: i=3 -->
  <text x="30"  y="227" fill="#94a3b8" font-size="11">4</text>
  <text x="80"  y="227" fill="#38bdf8" font-size="11">3</text>
  <text x="105" y="227" fill="#fbbf24" font-size="11">71</text>
  <text x="155" y="227" fill="#4ade80" font-size="11">71&lt;T[2]=75 → push 3</text>
  <text x="390" y="227" fill="#93c5fd" font-size="11">[2, 3]</text>
  <text x="590" y="227" fill="#94a3b8" font-size="11">[1,1,0,0,0,0,0,0]</text>

  <!-- Row 5: i=4 -->
  <rect x="20" y="234" width="820" height="24" fill="#1e293b" rx="3"/>
  <text x="30"  y="251" fill="#94a3b8" font-size="11">5</text>
  <text x="80"  y="251" fill="#38bdf8" font-size="11">4</text>
  <text x="105" y="251" fill="#fbbf24" font-size="11">69</text>
  <text x="155" y="251" fill="#4ade80" font-size="11">69&lt;T[3]=71 → push 4</text>
  <text x="390" y="251" fill="#93c5fd" font-size="11">[2, 3, 4]</text>
  <text x="590" y="251" fill="#94a3b8" font-size="11">[1,1,0,0,0,0,0,0]</text>

  <!-- Row 6: i=5 — two pops -->
  <text x="30"  y="272" fill="#94a3b8" font-size="11">6</text>
  <text x="80"  y="272" fill="#38bdf8" font-size="11">5</text>
  <text x="105" y="272" fill="#fbbf24" font-size="11">72</text>
  <text x="155" y="272" fill="#f87171" font-size="11">72&gt;T[4]=69 → pop 4, ans[4]=5-4=1</text>
  <text x="390" y="272" fill="#93c5fd" font-size="11">[2, 3]</text>
  <text x="590" y="272" fill="#4ade80" font-size="11">[1,1,0,0,1,0,0,0]</text>
  <text x="155" y="287" fill="#f87171" font-size="11">72&gt;T[3]=71 → pop 3, ans[3]=5-3=2</text>
  <text x="390" y="287" fill="#93c5fd" font-size="11">[2] → push 5 → [2, 5]</text>
  <text x="590" y="287" fill="#4ade80" font-size="11">[1,1,0,2,1,0,0,0]</text>

  <!-- Row 7: i=6 — two pops -->
  <rect x="20" y="295" width="820" height="34" fill="#1e293b" rx="3"/>
  <text x="30"  y="312" fill="#94a3b8" font-size="11">7</text>
  <text x="80"  y="312" fill="#38bdf8" font-size="11">6</text>
  <text x="105" y="312" fill="#fbbf24" font-size="11">76</text>
  <text x="155" y="312" fill="#f87171" font-size="11">76&gt;T[5]=72 → pop 5, ans[5]=6-5=1</text>
  <text x="390" y="312" fill="#93c5fd" font-size="11">[2]</text>
  <text x="590" y="312" fill="#4ade80" font-size="11">[1,1,0,2,1,1,0,0]</text>
  <text x="155" y="326" fill="#f87171" font-size="11">76&gt;T[2]=75 → pop 2, ans[2]=6-2=4</text>
  <text x="390" y="326" fill="#93c5fd" font-size="11">[] → push 6 → [6]</text>
  <text x="590" y="326" fill="#4ade80" font-size="11">[1,1,4,2,1,1,0,0]</text>

  <!-- Row 8: i=7 -->
  <text x="30"  y="352" fill="#94a3b8" font-size="11">8</text>
  <text x="80"  y="352" fill="#38bdf8" font-size="11">7</text>
  <text x="105" y="352" fill="#fbbf24" font-size="11">73</text>
  <text x="155" y="352" fill="#4ade80" font-size="11">73&lt;T[6]=76 → push 7</text>
  <text x="390" y="352" fill="#93c5fd" font-size="11">[6, 7]</text>
  <text x="590" y="352" fill="#94a3b8" font-size="11">[1,1,4,2,1,1,0,0]</text>

  <!-- End state -->
  <rect x="20" y="365" width="820" height="24" fill="#1e293b" rx="3"/>
  <text x="30"  y="382" fill="#94a3b8" font-size="11">end</text>
  <text x="80"  y="382" fill="#64748b" font-size="11">—</text>
  <text x="105" y="382" fill="#64748b" font-size="11">—</text>
  <text x="155" y="382" fill="#64748b" font-size="11">stack=[6,7]: no warmer future day → ans[6]=ans[7]=0 (default)</text>
  <text x="590" y="382" fill="#fbbf24" font-size="11" font-weight="bold">[1,1,4,2,1,1,0,0] ✓</text>

  <!-- Amortized note -->
  <rect x="20" y="400" width="820" height="50" fill="#1e293b" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="430" y="420" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="bold">Amortized O(n): 8 pushes + 6 pops = 14 total operations for n=8 array</text>
  <text x="430" y="438" text-anchor="middle" fill="#64748b" font-size="11">The while-loop runs 6 times total (not 8×8=64) — each index popped at most once across the entire scan</text>
  <text x="430" y="453" text-anchor="middle" fill="#4ade80" font-size="11">Worst case (decreasing array): n pushes + 0 pops in loop + n pops at flush = 2n ops total</text>
</svg>
