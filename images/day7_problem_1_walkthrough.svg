<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" font-family="Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2C2C2A"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3B8BD4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3B6D11"/>
    </marker>
  </defs>

  <rect width="680" height="620" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#2C2C2A">Design Linked List (#707) — Step-by-Step Walkthrough</text>
  <text x="340" y="44" text-anchor="middle" font-size="11" fill="#888780">addAtHead(1) → addAtTail(3) → addAtIndex(1,2) → get(1) → deleteAtIndex(1)</text>

  <!-- Helper: draws sentinel as shaded, data node as white -->
  <!-- Frame height: 76px each. Start y=58 -->

  <!-- ══ FRAME 0: Initial State ══ -->
  <circle cx="24" cy="74" r="11" fill="#2C2C2A"/>
  <text x="24" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">0</text>
  <text x="44" y="72" font-size="12" font-weight="600" fill="#2C2C2A">Initial state</text>
  <text x="44" y="88" font-size="11" fill="#888780">size=0</text>

  <!-- H -->
  <rect x="220" y="58" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="250" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <!-- H ↔ T arrows -->
  <path d="M281,69 L320,69" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M320,79 L281,79" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- T -->
  <rect x="322" y="58" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="352" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>
  <text x="430" y="68" font-size="11" fill="#888780">head.next = tail</text>
  <text x="430" y="84" font-size="11" fill="#888780">tail.prev = head</text>

  <line x1="20" y1="104" x2="660" y2="104" stroke="#F1EFE8" stroke-width="1"/>

  <!-- ══ FRAME 1: addAtHead(1) ══ -->
  <circle cx="24" cy="120" r="11" fill="#3B8BD4"/>
  <text x="24" y="124" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">1</text>
  <text x="44" y="118" font-size="12" font-weight="600" fill="#2C2C2A">addAtHead(1)</text>
  <text x="44" y="134" font-size="11" fill="#888780">_insert_after(head, 1) → size=1</text>

  <rect x="160" y="108" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="190" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <path d="M221,119 L258,119" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M258,129 L221,129" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="260" y="108" width="60" height="34" rx="8" fill="#3B8BD4" stroke="#2C2C2A" stroke-width="1"/>
  <text x="290" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">1</text>
  <path d="M321,119 L358,119" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M358,129 L321,129" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="360" y="108" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="390" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>
  <text x="448" y="120" font-size="11" fill="#3B8BD4">node(1) inserted</text>
  <text x="448" y="136" font-size="11" fill="#888780">after sentinel H</text>

  <line x1="20" y1="154" x2="660" y2="154" stroke="#F1EFE8" stroke-width="1"/>

  <!-- ══ FRAME 2: addAtTail(3) ══ -->
  <circle cx="24" cy="170" r="11" fill="#3B8BD4"/>
  <text x="24" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">2</text>
  <text x="44" y="168" font-size="12" font-weight="600" fill="#2C2C2A">addAtTail(3)</text>
  <text x="44" y="184" font-size="11" fill="#888780">_insert_after(tail.prev=node(1), 3) → size=2</text>

  <rect x="100" y="158" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="130" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <path d="M161,169 L198,169" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M198,179 L161,179" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="200" y="158" width="60" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="230" y="180" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <path d="M261,169 L298,169" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M298,179 L261,179" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="300" y="158" width="60" height="34" rx="8" fill="#3B8BD4" stroke="#2C2C2A" stroke-width="1"/>
  <text x="330" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">3</text>
  <path d="M361,169 L398,169" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M398,179 L361,179" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="400" y="158" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="430" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>
  <text x="480" y="170" font-size="11" fill="#3B8BD4">node(3) appended</text>
  <text x="480" y="186" font-size="11" fill="#888780">before sentinel T</text>

  <line x1="20" y1="204" x2="660" y2="204" stroke="#F1EFE8" stroke-width="1"/>

  <!-- ══ FRAME 3: addAtIndex(1, 2) ══ -->
  <circle cx="24" cy="220" r="11" fill="#3B8BD4"/>
  <text x="24" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">3</text>
  <text x="44" y="218" font-size="12" font-weight="600" fill="#2C2C2A">addAtIndex(1, 2)</text>
  <text x="44" y="234" font-size="11" fill="#888780">pred = _get_node(0) = node(1)  →  _insert_after(node(1), 2) → size=3</text>

  <rect x="60" y="208" width="56" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="88" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <path d="M117,219 L152,219" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M152,229 L117,229" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="154" y="208" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="182" y="230" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <path d="M211,219 L246,219" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M246,229 L211,229" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="248" y="208" width="56" height="34" rx="8" fill="#3B8BD4" stroke="#2C2C2A" stroke-width="1"/>
  <text x="276" y="230" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">2</text>
  <path d="M305,219 L340,219" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M340,229 L305,229" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="342" y="208" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="370" y="230" text-anchor="middle" font-size="13" fill="#2C2C2A">3</text>
  <path d="M399,219 L434,219" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M434,229 L399,229" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="436" y="208" width="56" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="464" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>
  <text x="508" y="220" font-size="11" fill="#3B8BD4">node(2) between</text>
  <text x="508" y="236" font-size="11" fill="#888780">node(1) and node(3)</text>

  <line x1="20" y1="254" x2="660" y2="254" stroke="#F1EFE8" stroke-width="1"/>

  <!-- ══ FRAME 4: get(1) ══ -->
  <circle cx="24" cy="278" r="11" fill="#3B6D11"/>
  <text x="24" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">4</text>
  <text x="44" y="276" font-size="12" font-weight="600" fill="#2C2C2A">get(1)</text>
  <text x="44" y="292" font-size="11" fill="#888780">index=1 ≤ size//2=1  →  traverse from head: head.next=node(1) → node(1).next=node(2)  →  return 2</text>

  <rect x="60" y="302" width="56" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="88" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <path d="M117,319 L152,319" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M152,329 L117,329" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="154" y="302" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#888780" stroke-width="1"/>
  <text x="182" y="324" text-anchor="middle" font-size="13" fill="#888780">1</text>
  <!-- cursor/pointer arrow -->
  <path d="M182,299 L182,302" stroke="#3B8BD4" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <text x="182" y="296" text-anchor="middle" font-size="9" fill="#888780">step 0</text>
  <path d="M211,319 L246,319" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M246,329 L211,329" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="248" y="302" width="56" height="34" rx="8" fill="#3B6D11" stroke="#2C2C2A" stroke-width="1"/>
  <text x="276" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">2</text>
  <text x="276" y="334" text-anchor="middle" font-size="9" fill="#FFFFFF">return ✓</text>
  <path d="M276,299 L276,302" stroke="#3B8BD4" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <text x="276" y="296" text-anchor="middle" font-size="9" fill="#3B8BD4">step 1</text>
  <path d="M305,319 L340,319" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M340,329 L305,329" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="342" y="302" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="370" y="324" text-anchor="middle" font-size="13" fill="#2C2C2A">3</text>
  <path d="M399,319 L434,319" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M434,329 L399,329" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="436" y="302" width="56" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="464" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>
  <text x="510" y="316" font-size="12" font-weight="600" fill="#3B6D11">→ returns 2</text>
  <text x="510" y="332" font-size="10" fill="#888780">1 hop from head</text>

  <line x1="20" y1="352" x2="660" y2="352" stroke="#F1EFE8" stroke-width="1"/>

  <!-- ══ FRAME 5: deleteAtIndex(1) ══ -->
  <circle cx="24" cy="372" r="11" fill="#E24B4A"/>
  <text x="24" y="376" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">5</text>
  <text x="44" y="370" font-size="12" font-weight="600" fill="#2C2C2A">deleteAtIndex(1)</text>
  <text x="44" y="386" font-size="11" fill="#888780">_get_node(1) = node(2)  →  _remove(node(2)):  node(1).next=node(3), node(3).prev=node(1) → size=2</text>

  <rect x="60" y="396" width="56" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="88" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <path d="M117,412 L152,412" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M152,422 L117,422" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="154" y="396" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="182" y="418" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <!-- deleted node (faded) -->
  <rect x="248" y="396" width="56" height="34" rx="8" fill="#F8F0F0" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="276" y="414" text-anchor="middle" font-size="13" fill="#E24B4A">2</text>
  <text x="276" y="428" text-anchor="middle" font-size="9" fill="#E24B4A">removed</text>
  <!-- Skip-over arrow: 1 → 3 -->
  <path d="M210,406 Q276,384 338,406" stroke="#3B6D11" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <text x="276" y="382" text-anchor="middle" font-size="9" fill="#3B6D11">node(1).next = node(3)</text>
  <!-- backward arrow 3 → 1 -->
  <path d="M342" d="M340,430 Q276,450 212,430" stroke="#3B6D11" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <rect x="342" y="396" width="56" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="370" y="418" text-anchor="middle" font-size="13" fill="#2C2C2A">3</text>
  <path d="M399,412 L434,412" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M434,422 L399,422" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="436" y="396" width="56" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="464" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>

  <line x1="20" y1="450" x2="660" y2="450" stroke="#F1EFE8" stroke-width="1"/>

  <!-- ══ FRAME 6: Final State ══ -->
  <circle cx="24" cy="472" r="11" fill="#3B6D11"/>
  <text x="24" y="476" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">✓</text>
  <text x="44" y="470" font-size="12" font-weight="600" fill="#2C2C2A">Final State</text>
  <text x="44" y="486" font-size="11" fill="#888780">size=2</text>

  <rect x="220" y="460" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="250" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">H</text>
  <path d="M281,472 L320,472" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M320,482 L281,482" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="322" y="460" width="60" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="352" y="482" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <path d="M383,472 L422,472" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M422,482 L383,482" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="424" y="460" width="60" height="34" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
  <text x="454" y="482" text-anchor="middle" font-size="13" fill="#2C2C2A">3</text>
  <path d="M485,472 L524,472" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M524,482 L485,482" stroke="#2C2C2A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="526" y="460" width="60" height="34" rx="8" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="1"/>
  <text x="556" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">T</text>
  <text x="604" y="476" font-size="12" font-weight="600" fill="#3B6D11">1 → 3  ✓</text>

  <!-- Legend -->
  <rect x="20" y="508" width="640" height="96" rx="8" fill="#F8F8F6" stroke="#E0E0D8" stroke-width="1"/>
  <text x="36" y="528" font-size="12" font-weight="600" fill="#2C2C2A">Key — Operation complexity:</text>
  <rect x="36" y="538" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="52" y="548" font-size="11" fill="#2C2C2A">Sentinel (H/T) — always present, never returned</text>
  <rect x="36" y="556" width="10" height="10" rx="2" fill="#3B8BD4"/>
  <text x="52" y="566" font-size="11" fill="#2C2C2A">Newly inserted node</text>
  <rect x="36" y="574" width="10" height="10" rx="2" fill="#E24B4A"/>
  <text x="52" y="584" font-size="11" fill="#2C2C2A">Deleted node (unreachable after _remove)</text>
  <text x="320" y="548" font-size="11" fill="#888780">addAtHead/addAtTail: O(1)  |  addAtIndex/deleteAtIndex: O(n)</text>
  <text x="320" y="566" font-size="11" fill="#888780">get: O(n) — bidirectional halves to O(n/2)</text>
  <text x="320" y="584" font-size="11" fill="#888780">size tracked in _insert_after / _remove only</text>
</svg>
