<svg viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="680" height="660" fill="#FFFFFF"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2C2C2A"/>
    </marker>
    <marker id="arr_o" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#EF9F27"/>
    </marker>
  </defs>

  <text x="340" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#2C2C2A">Flatten Multilevel DLL (#430) — DFS Splice Walkthrough</text>
  <text x="340" y="38" text-anchor="middle" font-size="11" fill="#888780">1⟷2⟷3⟷4, node3→child[7⟷8⟷9], node7→child[10⟷11]</text>

  <!-- ===== FRAME 1: Initial state ===== -->
  <circle cx="22" cy="62" r="12" fill="#2C2C2A"/>
  <text x="22" y="67" text-anchor="middle" font-size="11" fill="#FFFFFF">1</text>
  <text x="46" y="67" font-size="12" font-weight="500" fill="#2C2C2A">Initial structure — main list + 2 levels of children</text>
  <rect x="10" y="74" width="660" height="96" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Main list -->
  <text x="20" y="93" font-size="10" fill="#888780">main:</text>
  <rect x="50"  y="80" width="32" height="26" rx="6" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="66"  y="98" text-anchor="middle" font-size="12" fill="#2C2C2A">1</text>
  <line x1="82" y1="93" x2="90" y2="93" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="90"  y="80" width="32" height="26" rx="6" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="106" y="98" text-anchor="middle" font-size="12" fill="#2C2C2A">2</text>
  <line x1="122" y1="93" x2="130" y2="93" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- node 3 has child -->
  <rect x="130" y="80" width="32" height="26" rx="6" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="146" y="98" text-anchor="middle" font-size="12" fill="#3B8BD4">3</text>
  <line x1="162" y1="93" x2="170" y2="93" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="170" y="80" width="32" height="26" rx="6" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="186" y="98" text-anchor="middle" font-size="12" fill="#2C2C2A">4</text>

  <!-- child arrow from node 3 down -->
  <line x1="146" y1="106" x2="146" y2="122" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr_o)" stroke-dasharray="3,2"/>
  <text x="158" y="118" font-size="9" fill="#EF9F27">child</text>

  <!-- Level 2: child list of node 3 -->
  <text x="20" y="138" font-size="10" fill="#888780">lv2:</text>
  <!-- node 7 has child -->
  <rect x="110" y="124" width="32" height="26" rx="6" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="126" y="142" text-anchor="middle" font-size="12" fill="#3B8BD4">7</text>
  <line x1="142" y1="137" x2="150" y2="137" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="150" y="124" width="32" height="26" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="166" y="142" text-anchor="middle" font-size="12" fill="#2C2C2A">8</text>
  <line x1="182" y1="137" x2="190" y2="137" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="190" y="124" width="32" height="26" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="206" y="142" text-anchor="middle" font-size="12" fill="#2C2C2A">9</text>

  <!-- child arrow from node 7 down -->
  <line x1="126" y1="150" x2="126" y2="162" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arr_o)" stroke-dasharray="3,2"/>

  <!-- Level 3: child list of node 7 -->
  <text x="20" y="177" font-size="10" fill="#888780">lv3:</text>
  <rect x="95"  y="162" width="32" height="26" rx="6" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="111" y="180" text-anchor="middle" font-size="12" fill="#2C2C2A">10</text>
  <line x1="127" y1="175" x2="135" y2="175" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="135" y="162" width="32" height="26" rx="6" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="151" y="180" text-anchor="middle" font-size="12" fill="#2C2C2A">11</text>

  <text x="380" y="100" font-size="11" fill="#2C2C2A">cur starts at node 1</text>
  <text x="380" y="116" font-size="10" fill="#888780">node[3] and node[7] have child pointers</text>
  <text x="380" y="132" font-size="10" fill="#888780">Invariant: n.prev.next==n  and  n.next.prev==n</text>
  <text x="380" y="156" font-size="10" fill="#888780">cur advances until it finds cur.child != None</text>

  <!-- ===== FRAME 2: cur=1,2 advance ===== -->
  <circle cx="22" cy="190" r="12" fill="#2C2C2A"/>
  <text x="22" y="195" text-anchor="middle" font-size="11" fill="#FFFFFF">2</text>
  <text x="46" y="195" font-size="12" font-weight="500" fill="#2C2C2A">cur=1: no child → advance.   cur=2: no child → advance.   cur=3: has child!</text>
  <rect x="10" y="202" width="660" height="58" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <rect x="50"  y="213" width="32" height="26" rx="6" fill="#888780" stroke="#888780" stroke-width="0.5"/>
  <text x="66"  y="231" text-anchor="middle" font-size="12" fill="#FFFFFF">1</text>
  <line x1="82" y1="226" x2="90" y2="226" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="90"  y="213" width="32" height="26" rx="6" fill="#888780" stroke="#888780" stroke-width="0.5"/>
  <text x="106" y="231" text-anchor="middle" font-size="12" fill="#FFFFFF">2</text>
  <line x1="122" y1="226" x2="130" y2="226" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="130" y="213" width="32" height="26" rx="6" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="146" y="231" text-anchor="middle" font-size="12" fill="#3B8BD4">3</text>
  <text x="66" y="250" text-anchor="middle" font-size="9" fill="#888780">visited</text>
  <text x="106" y="250" text-anchor="middle" font-size="9" fill="#888780">visited</text>
  <text x="146" y="250" text-anchor="middle" font-size="9" fill="#3B8BD4">cur ← HERE</text>
  <text x="380" y="224" font-size="11" fill="#EF9F27">cur=3, cur.child=7 → splice!</text>
  <text x="380" y="240" font-size="10" fill="#888780">Save: next_node = cur.next = node[4]</text>
  <text x="380" y="254" font-size="10" fill="#888780">4-pointer stitch begins</text>

  <!-- ===== FRAME 3: Splice at node 3 ===== -->
  <circle cx="22" cy="280" r="12" fill="#2C2C2A"/>
  <text x="22" y="285" text-anchor="middle" font-size="11" fill="#FFFFFF">3</text>
  <text x="46" y="285" font-size="12" font-weight="500" fill="#2C2C2A">Splice child[7→8→9] after node 3  —  4-pointer stitch</text>
  <rect x="10" y="292" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- 4 pointer labels -->
  <text x="20" y="310" font-size="10" fill="#3B8BD4">① 3.next = 7</text>
  <text x="20" y="324" font-size="10" fill="#3B8BD4">② 7.prev = 3</text>
  <text x="20" y="338" font-size="10" fill="#EF9F27">③ 9.next = 4  (saved next_node)</text>
  <text x="20" y="352" font-size="10" fill="#EF9F27">④ 4.prev = 9</text>
  <text x="20" y="366" font-size="10" fill="#888780">   3.child = None  (clear)</text>

  <!-- Resulting list after splice -->
  <text x="250" y="308" font-size="10" fill="#888780">Result after splice:</text>
  <rect x="250" y="312" width="28" height="24" rx="5" fill="#888780" stroke="#888780"/>
  <text x="264" y="329" text-anchor="middle" font-size="10" fill="#FFFFFF">1</text>
  <line x1="278" y1="324" x2="284" y2="324" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="284" y="312" width="28" height="24" rx="5" fill="#888780" stroke="#888780"/>
  <text x="298" y="329" text-anchor="middle" font-size="10" fill="#FFFFFF">2</text>
  <line x1="312" y1="324" x2="318" y2="324" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="318" y="312" width="28" height="24" rx="5" fill="#EEFFF3" stroke="#3B6D11"/>
  <text x="332" y="329" text-anchor="middle" font-size="10" fill="#3B6D11">3</text>
  <line x1="346" y1="324" x2="352" y2="324" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="352" y="312" width="28" height="24" rx="5" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="366" y="329" text-anchor="middle" font-size="10" fill="#3B8BD4">7</text>
  <line x1="380" y1="324" x2="386" y2="324" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="386" y="312" width="28" height="24" rx="5" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="400" y="329" text-anchor="middle" font-size="10" fill="#2C2C2A">8</text>
  <line x1="414" y1="324" x2="420" y2="324" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="420" y="312" width="28" height="24" rx="5" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="434" y="329" text-anchor="middle" font-size="10" fill="#2C2C2A">9</text>
  <line x1="448" y1="324" x2="454" y2="324" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="454" y="312" width="28" height="24" rx="5" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="468" y="329" text-anchor="middle" font-size="10" fill="#2C2C2A">4</text>
  <text x="366" y="350" text-anchor="middle" font-size="9" fill="#3B8BD4">cur next →</text>
  <text x="340" y="364" text-anchor="middle" font-size="10" fill="#888780">cur.next = 7; loop advances cur to node 7</text>

  <!-- ===== FRAME 4: cur=7, splice its child ===== -->
  <circle cx="22" cy="392" r="12" fill="#2C2C2A"/>
  <text x="22" y="397" text-anchor="middle" font-size="11" fill="#FFFFFF">4</text>
  <text x="46" y="397" font-size="12" font-weight="500" fill="#2C2C2A">cur=7: has child[10→11]!  Save next_node=8.  Splice again.</text>
  <rect x="10" y="404" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <text x="20" y="422" font-size="10" fill="#3B8BD4">① 7.next = 10</text>
  <text x="20" y="436" font-size="10" fill="#3B8BD4">② 10.prev = 7</text>
  <text x="20" y="450" font-size="10" fill="#EF9F27">③ 11.next = 8  (saved next_node)</text>
  <text x="20" y="464" font-size="10" fill="#EF9F27">④ 8.prev = 11</text>
  <text x="20" y="478" font-size="10" fill="#888780">   7.child = None  (clear)</text>

  <!-- Resulting list after 2nd splice -->
  <text x="250" y="420" font-size="10" fill="#888780">Result after 2nd splice:</text>
  <rect x="250" y="424" width="24" height="22" rx="4" fill="#888780" stroke="#888780"/>
  <text x="262" y="440" text-anchor="middle" font-size="9" fill="#FFFFFF">1</text>
  <line x1="274" y1="435" x2="279" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="279" y="424" width="24" height="22" rx="4" fill="#888780" stroke="#888780"/>
  <text x="291" y="440" text-anchor="middle" font-size="9" fill="#FFFFFF">2</text>
  <line x1="303" y1="435" x2="308" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="308" y="424" width="24" height="22" rx="4" fill="#888780" stroke="#888780"/>
  <text x="320" y="440" text-anchor="middle" font-size="9" fill="#FFFFFF">3</text>
  <line x1="332" y1="435" x2="337" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="337" y="424" width="24" height="22" rx="4" fill="#EEFFF3" stroke="#3B6D11"/>
  <text x="349" y="440" text-anchor="middle" font-size="9" fill="#3B6D11">7</text>
  <line x1="361" y1="435" x2="366" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="366" y="424" width="24" height="22" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="378" y="440" text-anchor="middle" font-size="9" fill="#3B8BD4">10</text>
  <line x1="390" y1="435" x2="395" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="395" y="424" width="24" height="22" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="407" y="440" text-anchor="middle" font-size="9" fill="#3B8BD4">11</text>
  <line x1="419" y1="435" x2="424" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="424" y="424" width="24" height="22" rx="4" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="436" y="440" text-anchor="middle" font-size="9" fill="#2C2C2A">8</text>
  <line x1="448" y1="435" x2="453" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="453" y="424" width="24" height="22" rx="4" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="465" y="440" text-anchor="middle" font-size="9" fill="#2C2C2A">9</text>
  <line x1="477" y1="435" x2="482" y2="435" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="482" y="424" width="24" height="22" rx="4" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="494" y="440" text-anchor="middle" font-size="9" fill="#2C2C2A">4</text>
  <text x="378" y="460" text-anchor="middle" font-size="9" fill="#3B8BD4">cur →</text>
  <text x="340" y="476" text-anchor="middle" font-size="10" fill="#888780">no more children at any level — continue advancing</text>

  <!-- ===== FRAME 5: Continue traversal ===== -->
  <circle cx="22" cy="504" r="12" fill="#2C2C2A"/>
  <text x="22" y="509" text-anchor="middle" font-size="11" fill="#FFFFFF">5</text>
  <text x="46" y="509" font-size="12" font-weight="500" fill="#2C2C2A">cur=10, 11, 8, 9, 4: no children → advance through all remaining nodes</text>
  <rect x="10" y="516" width="660" height="50" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="340" y="540" text-anchor="middle" font-size="11" fill="#888780">while cur: if cur.child → (never fires again) else cur = cur.next</text>
  <text x="340" y="558" text-anchor="middle" font-size="10" fill="#888780">cur reaches None → loop exits → return head</text>

  <!-- ===== FRAME 6: Final ===== -->
  <circle cx="22" cy="586" r="12" fill="#3B6D11"/>
  <text x="22" y="591" text-anchor="middle" font-size="11" fill="#FFFFFF">6</text>
  <text x="46" y="591" font-size="12" font-weight="500" fill="#2C2C2A">Return head — fully flattened DLL (DFS order preserved)</text>
  <rect x="10" y="598" width="660" height="50" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="340" y="618" text-anchor="middle" font-size="11" fill="#3B6D11">1 ⟷ 2 ⟷ 3 ⟷ 7 ⟷ 10 ⟷ 11 ⟷ 8 ⟷ 9 ⟷ 4   ✓</text>
  <text x="340" y="638" text-anchor="middle" font-size="10" fill="#888780">7's subtree (10→11) fully exhausted before 8 — DFS order correct   |   O(n) time, O(1) space</text>
</svg>
