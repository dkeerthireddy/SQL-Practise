  <text x="120" y="202" text-anchor="middle" font-size="11" fill="#FFF">pop (3,1,node3/L1)</text>
  <text x="250" y="202" font-size="11" fill="#2C2C2A">wire node(3/L1) ‚Üí push (4,1,node4/L1)</text>
  <text x="470" y="202" font-size="11" fill="#3B6D11">dummy‚Üí1‚Üí1‚Üí2‚Üí3</text>

  <line x1="15" y1="216" x2="665" y2="216" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="228" r="10" fill="#3B8BD4"/><text x="27" y="233" text-anchor="middle" font-size="10" fill="#FFF">5</text>
  <rect x="75" y="216" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="232" text-anchor="middle" font-size="11" fill="#FFF">pop (4,0,node4/L0)</text>
  <text x="250" y="232" font-size="11" fill="#2C2C2A">wire node(4/L0) ‚Üí push (5,0,node5/L0)</text>
  <text x="470" y="232" font-size="11" fill="#3B6D11">dummy‚Üí1‚Üí1‚Üí2‚Üí3‚Üí4</text>

  <line x1="15" y1="246" x2="665" y2="246" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="258" r="10" fill="#3B8BD4"/><text x="27" y="263" text-anchor="middle" font-size="10" fill="#FFF">6</text>
  <rect x="75" y="246" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="262" text-anchor="middle" font-size="11" fill="#FFF">pop (4,1,node4/L1)</text>
  <text x="250" y="262" font-size="11" fill="#2C2C2A">wire node(4/L1) ‚Üí node.next=‚àÖ don't push</text>
  <text x="470" y="262" font-size="11" fill="#3B6D11">dummy‚Üí1‚Üí1‚Üí2‚Üí3‚Üí4‚Üí4</text>

  <line x1="15" y1="276" x2="665" y2="276" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="288" r="10" fill="#3B8BD4"/><text x="27" y="293" text-anchor="middle" font-size="10" fill="#FFF">7</text>
  <rect x="75" y="276" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="292" text-anchor="middle" font-size="11" fill="#FFF">pop (5,0,node5/L0)</text>
  <text x="250" y="292" font-size="11" fill="#2C2C2A">wire node(5/L0) ‚Üí node.next=‚àÖ don't push</text>
  <text x="470" y="292" font-size="11" fill="#3B6D11">dummy‚Üí1‚Üí1‚Üí2‚Üí3‚Üí4‚Üí4‚Üí5</text>

  <line x1="15" y1="306" x2="665" y2="306" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="318" r="10" fill="#3B6D11"/><text x="27" y="323" text-anchor="middle" font-size="10" fill="#FFF">8</text>
  <rect x="75" y="306" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="322" text-anchor="middle" font-size="11" fill="#FFF">pop (6,2,node6/L2)</text>
  <text x="250" y="322" font-size="11" fill="#2C2C2A">wire node(6/L2) ‚Üí heap empty ‚Üí done</text>
  <text x="470" y="322" font-size="11" fill="#3B6D11">1‚Üí1‚Üí2‚Üí3‚Üí4‚Üí4‚Üí5‚Üí6 ‚úì</text>

  <rect x="20" y="342" width="640" height="72" rx="6" fill="#FFF8F0" stroke="#EF9F27" stroke-width="1"/>
  <text x="36" y="362" font-size="12" font-weight="500" fill="#EF9F27">Key insight: tiebreak index prevents TypeError</text>
  <text x="36" y="380" font-size="11" fill="#2C2C2A">Steps 1 and 2 both pop value=1. Tiebreak: (1, 0, ...) &lt; (1, 1, ...) ‚Üí L0 before L1.</text>
  <text x="36" y="396" font-size="11" fill="#2C2C2A">Without index i: Python compares the ListNode objects ‚Üí TypeError: not supported.</text>
  <text x="36" y="412" font-size="11" fill="#2C2C2A">Each of n=8 nodes: 1 push + 1 pop = O(log k=3) each ‚Üí total O(n log k) ‚úì</text>
</svg>
