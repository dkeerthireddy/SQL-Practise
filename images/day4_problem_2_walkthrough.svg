  </defs>
  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Problem 2: Merge k Sorted Lists (#23) ‚Äî Heap Walkthrough</text>
  <text x="340" y="38" text-anchor="middle" font-size="12" fill="#888780">lists = [1‚Üí4‚Üí5,  1‚Üí3‚Üí4,  2‚Üí6]</text>

  <text x="20" y="58" font-size="12" font-weight="500" fill="#2C2C2A">Step</text>
  <text x="80" y="58" font-size="12" font-weight="500" fill="#EF9F27">Heap top (min)</text>
  <text x="250" y="58" font-size="12" font-weight="500" fill="#2C2C2A">Action</text>
  <text x="470" y="58" font-size="12" font-weight="500" fill="#3B6D11">Output so far</text>
  <line x1="15" y1="62" x2="665" y2="62" stroke="#888780" stroke-width="0.5"/>

  <text x="20" y="82" font-size="11" fill="#2C2C2A">Init</text>
  <rect x="75" y="68" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="84" text-anchor="middle" font-size="11" fill="#FFF">(1,0,L0.head)</text>
  <rect x="170" y="68" width="70" height="22" rx="5" fill="#888780" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="205" y="84" text-anchor="middle" font-size="11" fill="#FFF">(1,1,L1.head)</text>
  <text x="250" y="82" font-size="11" fill="#2C2C2A">Push all 3 heads into heap</text>
  <text x="470" y="82" font-size="11" fill="#888780">(empty)</text>

  <line x1="15" y1="96" x2="665" y2="96" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="108" r="10" fill="#3B8BD4"/><text x="27" y="113" text-anchor="middle" font-size="10" fill="#FFF">1</text>
  <rect x="75" y="96" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="112" text-anchor="middle" font-size="11" fill="#FFF">pop (1,0,node1/L0)</text>
  <text x="250" y="112" font-size="11" fill="#2C2C2A">wire node(1/L0) ‚Üí push (4,0,node4/L0)</text>
  <text x="470" y="112" font-size="11" fill="#3B6D11">dummy‚Üí1</text>

  <line x1="15" y1="126" x2="665" y2="126" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="138" r="10" fill="#3B8BD4"/><text x="27" y="143" text-anchor="middle" font-size="10" fill="#FFF">2</text>
  <rect x="75" y="126" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="142" text-anchor="middle" font-size="11" fill="#FFF">pop (1,1,node1/L1)</text>
  <text x="250" y="142" font-size="11" fill="#2C2C2A">wire node(1/L1) ‚Üí push (3,1,node3/L1)</text>
  <text x="470" y="142" font-size="11" fill="#3B6D11">dummy‚Üí1‚Üí1</text>

  <line x1="15" y1="156" x2="665" y2="156" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="168" r="10" fill="#3B8BD4"/><text x="27" y="173" text-anchor="middle" font-size="10" fill="#FFF">3</text>
  <rect x="75" y="156" width="90" height="22" rx="5" fill="#EF9F27" stroke="#2C2C2A" stroke-width="0.5"/>
  <text x="120" y="172" text-anchor="middle" font-size="11" fill="#FFF">pop (2,2,node2/L2)</text>
  <text x="250" y="172" font-size="11" fill="#2C2C2A">wire node(2/L2) ‚Üí push (6,2,node6/L2)</text>
  <text x="470" y="172" font-size="11" fill="#3B6D11">dummy‚Üí1‚Üí1‚Üí2</text>

  <line x1="15" y1="186" x2="665" y2="186" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="27" cy="198" r="10" fill="#3B8BD4"/><text x="27" y="203" text-anchor="middle" font-size="10" fill="#FFF">4</text>
