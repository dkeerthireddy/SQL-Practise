<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520">
  <rect width="860" height="520" fill="#0f172a"/>

  <!-- Title -->
  <text x="430" y="38" font-family="monospace" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Expression Evaluation — Algorithm Overview</text>

  <!-- Subtitle: two variants -->
  <text x="215" y="70" font-family="monospace" font-size="13" fill="#94a3b8" text-anchor="middle">Variant 1: Infix + Parentheses (LC 224)</text>
  <text x="645" y="70" font-family="monospace" font-size="13" fill="#94a3b8" text-anchor="middle">Variant 2: Reverse Polish Notation (LC 150)</text>

  <!-- DIVIDER -->
  <line x1="430" y1="60" x2="430" y2="490" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === LEFT SIDE: LC 224 === -->
  <!-- Step boxes -->
  <!-- Box 1: digit -->
  <rect x="30" y="90" width="380" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="110" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="bold">ch is DIGIT</text>
  <text x="220" y="130" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">num = num * 10 + int(ch)   →   accumulate</text>

  <!-- Box 2: +/- -->
  <rect x="30" y="158" width="380" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="178" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="bold">ch is '+' or '-'</text>
  <text x="220" y="198" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">result += sign * num;  num=0;  sign=±1</text>

  <!-- Box 3: ( -->
  <rect x="30" y="226" width="380" height="62" rx="6" fill="#1c3a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="220" y="246" font-family="monospace" font-size="12" fill="#4ade80" text-anchor="middle" font-weight="bold">ch is '('</text>
  <text x="220" y="264" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">push(result);  push(sign)</text>
  <text x="220" y="280" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">result=0;  sign=+1   →   new scope</text>

  <!-- Box 4: ) -->
  <rect x="30" y="304" width="380" height="72" rx="6" fill="#3b1f1f" stroke="#f87171" stroke-width="1.5"/>
  <text x="220" y="324" font-family="monospace" font-size="12" fill="#f87171" text-anchor="middle" font-weight="bold">ch is ')'</text>
  <text x="220" y="342" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">result += sign * num;  num=0</text>
  <text x="220" y="358" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">result *= pop();   →   apply sign-before-paren</text>
  <text x="220" y="374" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">result += pop();   →   restore parent result</text>

  <!-- Box 5: end -->
  <rect x="30" y="392" width="380" height="42" rx="6" fill="#2d1f4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="220" y="412" font-family="monospace" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="bold">After loop</text>
  <text x="220" y="428" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">return result + sign * num</text>

  <!-- Stack diagram -->
  <rect x="30" y="448" width="380" height="40" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="42" y="463" font-family="monospace" font-size="11" fill="#94a3b8">Stack holds: </text>
  <rect x="130" y="450" width="80" height="22" rx="3" fill="#1e3a5f" stroke="#3b82f6"/>
  <text x="170" y="465" font-family="monospace" font-size="10" fill="#60a5fa" text-anchor="middle">result_k</text>
  <rect x="218" y="450" width="60" height="22" rx="3" fill="#1c3a2e" stroke="#22c55e"/>
  <text x="248" y="465" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">sign_k</text>
  <text x="285" y="463" font-family="monospace" font-size="11" fill="#94a3b8">  per depth</text>

  <!-- === RIGHT SIDE: LC 150 === -->
  <!-- Box 1: digit/number -->
  <rect x="450" y="90" width="380" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="640" y="110" font-family="monospace" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="bold">token is NUMBER</text>
  <text x="640" y="130" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">stack.push(int(token))   →   enqueue operand</text>

  <!-- Box 2: operator -->
  <rect x="450" y="158" width="380" height="82" rx="6" fill="#3b2a1f" stroke="#fb923c" stroke-width="1.5"/>
  <text x="640" y="178" font-family="monospace" font-size="12" fill="#fb923c" text-anchor="middle" font-weight="bold">token is OPERATOR (+, -, *, /)</text>
  <text x="640" y="196" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">b = stack.pop()   ← right operand</text>
  <text x="640" y="212" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">a = stack.pop()   ← left operand</text>
  <text x="640" y="228" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">stack.push( apply(op, a, b) )</text>

  <!-- Box 3: division note -->
  <rect x="450" y="256" width="380" height="52" rx="6" fill="#2d1f4e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="640" y="276" font-family="monospace" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="bold">⚠ Division Rule</text>
  <text x="640" y="296" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">int(a / b)   →   truncate toward zero</text>

  <!-- Box 4: result -->
  <rect x="450" y="324" width="380" height="42" rx="6" fill="#1c3a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="640" y="344" font-family="monospace" font-size="12" fill="#4ade80" text-anchor="middle" font-weight="bold">After all tokens</text>
  <text x="640" y="360" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">return stack[0]   →   single element remains</text>

  <!-- Example trace -->
  <rect x="450" y="382" width="380" height="106" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="462" y="398" font-family="monospace" font-size="11" fill="#f59e0b" font-weight="bold">Example:  ["2","1","+","3","*"]</text>
  <text x="462" y="414" font-family="monospace" font-size="11" fill="#94a3b8">"2"  → stack: [2]</text>
  <text x="462" y="430" font-family="monospace" font-size="11" fill="#94a3b8">"1"  → stack: [2, 1]</text>
  <text x="462" y="446" font-family="monospace" font-size="11" fill="#94a3b8">"+"  → pop 1,2 → push 3 → stack: [3]</text>
  <text x="462" y="462" font-family="monospace" font-size="11" fill="#94a3b8">"3"  → stack: [3, 3]</text>
  <text x="462" y="478" font-family="monospace" font-size="11" fill="#4ade80">"*"  → pop 3,3 → push 9 → return 9</text>

  <!-- Bottom label -->
  <text x="430" y="510" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">Invariant: stack depth = unresolved operands (RPN) | nesting depth (infix)</text>
</svg>
