<svg viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="680" height="760" fill="#FFFFFF"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2C2C2A"/>
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3B8BD4"/>
    </marker>
    <marker id="arr-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3B6D11"/>
    </marker>
  </defs>

  <text x="340" y="22" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">Palindrome Linked List — Visual Walkthrough</text>
  <text x="340" y="38" text-anchor="middle" font-size="11" fill="#888780">Input: 1 → 2 → 3 → 2 → 1  (n=5, odd length)</text>

  <!-- Helper: draw a list node -->
  <!-- Nodes at y=base: 1 at x=80, 2 at x=140, 3 at x=200, 4(2) at x=260, 5(1) at x=320 -->

  <!-- ===== FRAME 1 ===== -->
  <circle cx="20" cy="68" r="12" fill="#2C2C2A"/>
  <text x="20" y="73" text-anchor="middle" font-size="11" fill="#FFFFFF">1</text>
  <text x="50" y="68" font-size="12" font-weight="500" fill="#2C2C2A">Initial state</text>
  <rect x="10" y="80" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- list nodes frame 1 -->
  <rect x="60" y="94" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="78" y="113" text-anchor="middle" font-size="13" fill="#3B8BD4">1</text>
  <line x1="96" y1="108" x2="104" y2="108" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="104" y="94" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="122" y="113" text-anchor="middle" font-size="13" fill="#2C2C2A">2</text>
  <line x1="140" y1="108" x2="148" y2="108" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="148" y="94" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="166" y="113" text-anchor="middle" font-size="13" fill="#2C2C2A">3</text>
  <line x1="184" y1="108" x2="192" y2="108" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="192" y="94" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="210" y="113" text-anchor="middle" font-size="13" fill="#2C2C2A">2</text>
  <line x1="228" y1="108" x2="236" y2="108" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="236" y="94" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="254" y="113" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <!-- pointer labels -->
  <text x="78" y="90" text-anchor="middle" font-size="10" fill="#3B8BD4">slow</text>
  <text x="78" y="136" text-anchor="middle" font-size="10" fill="#3B8BD4">fast</text>
  <!-- stack -->
  <rect x="420" y="90" width="80" height="28" rx="4" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="460" y="109" text-anchor="middle" font-size="11" fill="#888780">stack = []</text>
  <text x="460" y="136" text-anchor="middle" font-size="10" fill="#888780">carry=0</text>
  <!-- state summary -->
  <text x="560" y="100" font-size="10" fill="#2C2C2A">slow=node(1)</text>
  <text x="560" y="114" font-size="10" fill="#2C2C2A">fast=node(1)</text>
  <text x="560" y="128" font-size="10" fill="#2C2C2A">stack=[]</text>

  <!-- ===== FRAME 2 ===== -->
  <circle cx="20" cy="178" r="12" fill="#2C2C2A"/>
  <text x="20" y="183" text-anchor="middle" font-size="11" fill="#FFFFFF">2</text>
  <text x="50" y="178" font-size="12" font-weight="500" fill="#2C2C2A">Iteration 1 — push 1, advance slow→2, fast→3</text>
  <rect x="10" y="190" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <rect x="60" y="204" width="36" height="28" rx="6" fill="#F0F6FF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="78" y="223" text-anchor="middle" font-size="13" fill="#3B8BD4">1</text>
  <line x1="96" y1="218" x2="104" y2="218" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="104" y="204" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="122" y="223" text-anchor="middle" font-size="13" fill="#3B8BD4">2</text>
  <line x1="140" y1="218" x2="148" y2="218" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="148" y="204" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="166" y="223" text-anchor="middle" font-size="13" fill="#2C2C2A">3</text>
  <line x1="184" y1="218" x2="192" y2="218" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="192" y="204" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="210" y="223" text-anchor="middle" font-size="13" fill="#2C2C2A">2</text>
  <line x1="228" y1="218" x2="236" y2="218" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="236" y="204" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="254" y="223" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <!-- pushed node(1) indicator -->
  <text x="78" y="200" text-anchor="middle" font-size="10" fill="#888780">pushed</text>
  <text x="122" y="200" text-anchor="middle" font-size="10" fill="#3B8BD4">slow</text>
  <text x="166" y="200" text-anchor="middle" font-size="10" fill="#3B8BD4">fast</text>
  <!-- stack -->
  <rect x="420" y="200" width="80" height="28" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="460" y="219" text-anchor="middle" font-size="11" fill="#3B8BD4">1 ← top</text>
  <text x="560" y="210" font-size="10" fill="#2C2C2A">slow=node(2)</text>
  <text x="560" y="224" font-size="10" fill="#2C2C2A">fast=node(3)</text>
  <text x="560" y="238" font-size="10" fill="#2C2C2A">stack=[1]</text>

  <!-- ===== FRAME 3 ===== -->
  <circle cx="20" cy="288" r="12" fill="#2C2C2A"/>
  <text x="20" y="293" text-anchor="middle" font-size="11" fill="#FFFFFF">3</text>
  <text x="50" y="288" font-size="12" font-weight="500" fill="#2C2C2A">Iteration 2 — push 2, advance slow→3, fast→1(last)</text>
  <rect x="10" y="300" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <rect x="60" y="314" width="36" height="28" rx="6" fill="#F0F6FF" stroke="#888780" stroke-width="0.5"/>
  <text x="78" y="333" text-anchor="middle" font-size="13" fill="#888780">1</text>
  <line x1="96" y1="328" x2="104" y2="328" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="104" y="314" width="36" height="28" rx="6" fill="#F0F6FF" stroke="#888780" stroke-width="0.5"/>
  <text x="122" y="333" text-anchor="middle" font-size="13" fill="#888780">2</text>
  <line x1="140" y1="328" x2="148" y2="328" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="148" y="314" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="166" y="333" text-anchor="middle" font-size="13" fill="#3B8BD4">3</text>
  <line x1="184" y1="328" x2="192" y2="328" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="192" y="314" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="210" y="333" text-anchor="middle" font-size="13" fill="#2C2C2A">2</text>
  <line x1="228" y1="328" x2="236" y2="328" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="236" y="314" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="254" y="333" text-anchor="middle" font-size="13" fill="#3B8BD4">1</text>
  <text x="122" y="310" text-anchor="middle" font-size="10" fill="#888780">pushed</text>
  <text x="166" y="310" text-anchor="middle" font-size="10" fill="#3B8BD4">slow</text>
  <text x="254" y="310" text-anchor="middle" font-size="10" fill="#3B8BD4">fast</text>
  <!-- stack -->
  <rect x="420" y="308" width="80" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="460" y="325" text-anchor="middle" font-size="11" fill="#3B8BD4">2 ← top</text>
  <rect x="420" y="332" width="80" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="460" y="349" text-anchor="middle" font-size="11" fill="#3B8BD4">1</text>
  <text x="560" y="320" font-size="10" fill="#2C2C2A">slow=node(3)</text>
  <text x="560" y="334" font-size="10" fill="#2C2C2A">fast=node(1)</text>
  <text x="560" y="348" font-size="10" fill="#2C2C2A">stack=[1,2]</text>

  <!-- ===== FRAME 4 ===== -->
  <circle cx="20" cy="398" r="12" fill="#EF9F27"/>
  <text x="20" y="403" text-anchor="middle" font-size="11" fill="#FFFFFF">4</text>
  <text x="50" y="398" font-size="12" font-weight="500" fill="#2C2C2A">Loop exit — fast≠None → odd length → skip middle node(3)</text>
  <rect x="10" y="410" width="660" height="80" rx="6" fill="#FFF9EC" stroke="#EF9F27" stroke-width="0.5"/>

  <rect x="60" y="424" width="36" height="28" rx="6" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="78" y="443" text-anchor="middle" font-size="13" fill="#888780">1</text>
  <line x1="96" y1="438" x2="104" y2="438" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="104" y="424" width="36" height="28" rx="6" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="122" y="443" text-anchor="middle" font-size="13" fill="#888780">2</text>
  <line x1="140" y1="438" x2="148" y2="438" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="148" y="424" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="166" y="443" text-anchor="middle" font-size="13" fill="#EF9F27">3</text>
  <line x1="184" y1="438" x2="192" y2="438" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="192" y="424" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="210" y="443" text-anchor="middle" font-size="13" fill="#3B8BD4">2</text>
  <line x1="228" y1="438" x2="236" y2="438" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="236" y="424" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="254" y="443" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <text x="166" y="420" text-anchor="middle" font-size="10" fill="#EF9F27">skip</text>
  <text x="210" y="420" text-anchor="middle" font-size="10" fill="#3B8BD4">slow→</text>
  <!-- stack unchanged -->
  <rect x="420" y="420" width="80" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="460" y="437" text-anchor="middle" font-size="11" fill="#3B8BD4">2 ← top</text>
  <rect x="420" y="444" width="80" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="460" y="461" text-anchor="middle" font-size="11" fill="#3B8BD4">1</text>
  <text x="560" y="430" font-size="10" fill="#2C2C2A">slow=node(2)  ← after skip</text>
  <text x="560" y="444" font-size="10" fill="#888780">fast=node(1) ≠ None</text>
  <text x="560" y="458" font-size="10" fill="#2C2C2A">stack=[1,2]</text>

  <!-- ===== FRAME 5 ===== -->
  <circle cx="20" cy="508" r="12" fill="#2C2C2A"/>
  <text x="20" y="513" text-anchor="middle" font-size="11" fill="#FFFFFF">5</text>
  <text x="50" y="508" font-size="12" font-weight="500" fill="#2C2C2A">Compare iter 1 — slow.val(2) == stack.pop()(2) ✓</text>
  <rect x="10" y="520" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <rect x="192" y="534" width="36" height="28" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="210" y="553" text-anchor="middle" font-size="13" fill="#3B6D11">2</text>
  <line x1="228" y1="548" x2="236" y2="548" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="236" y="534" width="36" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
  <text x="254" y="553" text-anchor="middle" font-size="13" fill="#3B8BD4">1</text>
  <text x="210" y="530" text-anchor="middle" font-size="10" fill="#3B6D11">match ✓</text>
  <text x="254" y="530" text-anchor="middle" font-size="10" fill="#3B8BD4">slow→</text>
  <!-- stack after pop -->
  <rect x="420" y="532" width="80" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="460" y="549" text-anchor="middle" font-size="11" fill="#3B8BD4">1 ← top</text>
  <text x="380" y="566" font-size="10" fill="#888780">(2 popped)</text>
  <text x="560" y="542" font-size="10" fill="#2C2C2A">slow=node(1)</text>
  <text x="560" y="556" font-size="10" fill="#3B6D11">2 == pop(2) ✓</text>
  <text x="560" y="570" font-size="10" fill="#2C2C2A">stack=[1]</text>

  <!-- ===== FRAME 6 ===== -->
  <circle cx="20" cy="618" r="12" fill="#2C2C2A"/>
  <text x="20" y="623" text-anchor="middle" font-size="11" fill="#FFFFFF">6</text>
  <text x="50" y="618" font-size="12" font-weight="500" fill="#2C2C2A">Compare iter 2 — slow.val(1) == stack.pop()(1) ✓</text>
  <rect x="10" y="630" width="660" height="80" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>

  <rect x="236" y="644" width="36" height="28" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="254" y="663" text-anchor="middle" font-size="13" fill="#3B6D11">1</text>
  <text x="254" y="640" text-anchor="middle" font-size="10" fill="#3B6D11">match ✓</text>
  <text x="254" y="686" text-anchor="middle" font-size="10" fill="#3B8BD4">slow→None</text>
  <!-- stack empty -->
  <rect x="420" y="642" width="80" height="28" rx="4" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="460" y="661" text-anchor="middle" font-size="11" fill="#888780">stack = []</text>
  <text x="380" y="676" font-size="10" fill="#888780">(1 popped)</text>
  <text x="560" y="652" font-size="10" fill="#2C2C2A">slow=None</text>
  <text x="560" y="666" font-size="10" fill="#3B6D11">1 == pop(1) ✓</text>
  <text x="560" y="680" font-size="10" fill="#2C2C2A">stack=[]</text>

  <!-- ===== FRAME 7 (Result) ===== -->
  <circle cx="20" cy="728" r="12" fill="#3B6D11"/>
  <text x="20" y="733" text-anchor="middle" font-size="11" fill="#FFFFFF">7</text>
  <text x="50" y="728" font-size="12" font-weight="500" fill="#2C2C2A">Result — slow=None, all matched → return True ✓</text>
  <rect x="10" y="738" width="660" height="18" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="340" y="751" text-anchor="middle" font-size="12" fill="#3B6D11">1 → 2 → 3 → 2 → 1 is a palindrome ✓  |  Stack pushed n/2 = 2 values, not n=5</text>
</svg>
