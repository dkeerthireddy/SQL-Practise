<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="680" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">Stack + Linked List — Two Core Patterns</text>

  <!-- ===== LEFT: Stack as Mirror (Palindrome) ===== -->
  <text x="170" y="58" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Pattern 1: Stack as Mirror</text>
  <text x="170" y="74" text-anchor="middle" font-size="11" fill="#888780">Palindrome Linked List (#234)</text>

  <!-- List nodes -->
  <g>
    <!-- node 1 (active - blue) -->
    <rect x="20" y="90" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
    <text x="42" y="111" text-anchor="middle" font-size="13" fill="#3B8BD4">1</text>
    <!-- node 2 (active - blue) -->
    <rect x="76" y="90" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1.5"/>
    <text x="98" y="111" text-anchor="middle" font-size="13" fill="#3B8BD4">2</text>
    <!-- node 3 (orange - middle) -->
    <rect x="132" y="90" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#EF9F27" stroke-width="1.5"/>
    <text x="154" y="111" text-anchor="middle" font-size="13" fill="#EF9F27">3</text>
    <!-- node 4 (gray - compare) -->
    <rect x="188" y="90" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
    <text x="210" y="111" text-anchor="middle" font-size="13" fill="#2C2C2A">2</text>
    <!-- node 5 (gray) -->
    <rect x="244" y="90" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
    <text x="266" y="111" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
    <!-- arrows between nodes -->
    <line x1="64" y1="106" x2="76" y2="106" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="120" y1="106" x2="132" y2="106" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="176" y1="106" x2="188" y2="106" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="232" y1="106" x2="244" y2="106" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
    <!-- labels -->
    <text x="42" y="138" text-anchor="middle" font-size="10" fill="#3B8BD4">slow</text>
    <text x="266" y="138" text-anchor="middle" font-size="10" fill="#888780">fast</text>
    <text x="154" y="138" text-anchor="middle" font-size="10" fill="#EF9F27">middle</text>
  </g>

  <!-- Push arrow to stack -->
  <text x="154" y="165" text-anchor="middle" font-size="11" fill="#3B8BD4">push first half →</text>

  <!-- Stack (showing pushed values) -->
  <rect x="60" y="175" width="50" height="28" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="85" y="194" text-anchor="middle" font-size="12" fill="#3B8BD4">2</text>
  <rect x="60" y="203" width="50" height="28" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="85" y="222" text-anchor="middle" font-size="12" fill="#3B8BD4">1</text>
  <text x="85" y="245" text-anchor="middle" font-size="11" fill="#888780">stack</text>

  <!-- Pop arrow -->
  <text x="154" y="210" text-anchor="middle" font-size="11" fill="#888780">pop ←→ compare</text>

  <!-- Compare nodes (second half) -->
  <rect x="195" y="185" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="217" y="206" text-anchor="middle" font-size="13" fill="#2C2C2A">2</text>
  <rect x="248" y="185" width="44" height="32" rx="8" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="270" y="206" text-anchor="middle" font-size="13" fill="#2C2C2A">1</text>
  <line x1="239" y1="201" x2="248" y2="201" stroke="#2C2C2A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="217" y="232" text-anchor="middle" font-size="10" fill="#888780">slow →</text>

  <!-- Result -->
  <rect x="80" y="265" width="160" height="28" rx="8" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="160" y="284" text-anchor="middle" font-size="12" fill="#3B6D11">all match → palindrome ✓</text>

  <!-- Divider -->
  <line x1="340" y1="45" x2="340" y2="400" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: Stack as Digit Reverser (Add Two Numbers II) ===== -->
  <text x="510" y="58" text-anchor="middle" font-size="13" font-weight="500" fill="#2C2C2A">Pattern 2: Stack as Digit Reverser</text>
  <text x="510" y="74" text-anchor="middle" font-size="11" fill="#888780">Add Two Numbers II (#445)</text>

  <!-- Input lists -->
  <text x="365" y="100" font-size="11" fill="#888780">l1:</text>
  <rect x="385" y="86" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1"/>
  <text x="400" y="105" text-anchor="middle" font-size="12" fill="#3B8BD4">7</text>
  <line x1="415" y1="100" x2="423" y2="100" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="423" y="86" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1"/>
  <text x="438" y="105" text-anchor="middle" font-size="12" fill="#3B8BD4">2</text>
  <line x1="453" y1="100" x2="461" y2="100" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="461" y="86" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1"/>
  <text x="476" y="105" text-anchor="middle" font-size="12" fill="#3B8BD4">4</text>
  <line x1="491" y1="100" x2="499" y2="100" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="499" y="86" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#3B8BD4" stroke-width="1"/>
  <text x="514" y="105" text-anchor="middle" font-size="12" fill="#3B8BD4">3</text>

  <text x="365" y="130" font-size="11" fill="#888780">l2:</text>
  <rect x="423" y="118" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="438" y="137" text-anchor="middle" font-size="12" fill="#2C2C2A">5</text>
  <line x1="453" y1="132" x2="461" y2="132" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="461" y="118" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="476" y="137" text-anchor="middle" font-size="12" fill="#2C2C2A">6</text>
  <line x1="491" y1="132" x2="499" y2="132" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="499" y="118" width="30" height="28" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="0.5"/>
  <text x="514" y="137" text-anchor="middle" font-size="12" fill="#2C2C2A">4</text>

  <!-- Push arrow -->
  <text x="510" y="165" text-anchor="middle" font-size="11" fill="#2C2C2A">↓ push all → pop LSD first</text>

  <!-- Stacks -->
  <text x="405" y="183" text-anchor="middle" font-size="11" fill="#888780">s1</text>
  <rect x="380" y="188" width="50" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="405" y="205" text-anchor="middle" font-size="11" fill="#3B8BD4">3 ←top</text>
  <rect x="380" y="212" width="50" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="405" y="229" text-anchor="middle" font-size="11" fill="#3B8BD4">4</text>
  <rect x="380" y="236" width="50" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="405" y="253" text-anchor="middle" font-size="11" fill="#3B8BD4">2</text>
  <rect x="380" y="260" width="50" height="24" rx="4" fill="#EEF5FF" stroke="#3B8BD4" stroke-width="0.5"/>
  <text x="405" y="277" text-anchor="middle" font-size="11" fill="#3B8BD4">7</text>

  <text x="540" y="183" text-anchor="middle" font-size="11" fill="#888780">s2</text>
  <rect x="515" y="188" width="50" height="24" rx="4" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="540" y="205" text-anchor="middle" font-size="11" fill="#2C2C2A">4 ←top</text>
  <rect x="515" y="212" width="50" height="24" rx="4" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="540" y="229" text-anchor="middle" font-size="11" fill="#2C2C2A">6</text>
  <rect x="515" y="236" width="50" height="24" rx="4" fill="#F5F5F5" stroke="#888780" stroke-width="0.5"/>
  <text x="540" y="253" text-anchor="middle" font-size="11" fill="#2C2C2A">5</text>

  <!-- Add with carry label -->
  <text x="472" y="300" text-anchor="middle" font-size="11" fill="#EF9F27">pop + add + carry → prepend</text>

  <!-- Result list (built by prepend) -->
  <text x="365" y="335" font-size="11" fill="#888780">result:</text>
  <rect x="398" y="320" width="30" height="28" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="413" y="339" text-anchor="middle" font-size="12" fill="#3B6D11">7</text>
  <line x1="428" y1="334" x2="436" y2="334" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="436" y="320" width="30" height="28" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="451" y="339" text-anchor="middle" font-size="12" fill="#3B6D11">8</text>
  <line x1="466" y1="334" x2="474" y2="334" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="474" y="320" width="30" height="28" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="489" y="339" text-anchor="middle" font-size="12" fill="#3B6D11">0</text>
  <line x1="504" y1="334" x2="512" y2="334" stroke="#2C2C2A" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="512" y="320" width="30" height="28" rx="6" fill="#EEFFF3" stroke="#3B6D11" stroke-width="1"/>
  <text x="527" y="339" text-anchor="middle" font-size="12" fill="#3B6D11">7</text>
  <text x="462" y="365" text-anchor="middle" font-size="11" fill="#3B6D11">7243 + 564 = 7807 ✓</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2C2C2A"/>
    </marker>
  </defs>

  <!-- Bottom key insight -->
  <rect x="20" y="390" width="640" height="24" rx="6" fill="#F8F8F6" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="340" y="406" text-anchor="middle" font-size="11" fill="#2C2C2A">Stack = reverse-order access at O(n) space cost — reach for it when tail-before-head traversal is needed</text>
</svg>
